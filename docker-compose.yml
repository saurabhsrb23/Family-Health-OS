version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: praan_postgres
    environment:
      POSTGRES_DB: praan_health
      POSTGRES_USER: praan_user
      POSTGRES_PASSWORD: praan_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praan_user -d praan_health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: praan_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praan_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://praan_user:praan_pass@postgres:5432/praan_health
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: praan-health-super-secret-jwt-key-change-in-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 10
      ENVIRONMENT: development
    volumes:
      - ./backend:/app                  # hot-reload: code changes reflect instantly
      - uploads_data:/app/uploads       # persist uploaded files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
